<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Packet Visualizer</title>

<link rel="stylesheet" href="/static/css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="sidebar">

<div class="page-title">
    <img src="/static/assets/logo.png"
         alt="Packet Visualizer Logo"
         class="logo">

    <h2>Packet Visualizer</h2>
</div>
<button id="startBtn">▶ Start Capture</button>

<button id="stopBtn" disabled>■ Stop Capture</button>

<hr>

<div class="stat">
<h3>Total Packets</h3>
<h1 id="total">0</h1>
</div>

<div class="stat">
    <h3>Capture Status</h3>
    <h1 id="status" class="stopped">STOPPED</h1>
</div>

<div class="stat">
    <h3>Threat Level</h3>
    <h1 id="threat" class="low">LOW</h1>
</div>

<div class="stat">
    <h3>Threat Reason</h3>
    <p id="reason">Normal Network Activity</p>
</div>

</div>

<div class="main">

<div class="topbar">

<h1>Network Intelligence Dashboard</h1>

</div>

<div class="cards">

<div class="card">
<h3>Protocol Distribution</h3>

<canvas id="protocolChart"></canvas>

</div>

<div class="card">

<h3>Live Traffic</h3>

<table id="packetTable">

<thead>

<tr>

<th>ID</th>

<th>Source</th>

<th>Destination</th>

<th>Protocol</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<div class="card">
    <h3>Top Source IPs</h3>

    <table id="topTalkers">
        <thead>
            <tr>
                <th>IP Address</th>
                <th>Packets</th>
            </tr>
        </thead>

        <tbody></tbody>
    </table>
</div>

<div class="card">

<h3>AI Assistant</h3>

<input id="question" placeholder="Ask about your network...">

<button id="ask">Ask AI</button>

<pre id="answer"></pre>

</div>

<div class="card">
    <h3>Traffic Rate</h3>

    <canvas id="trafficChart"></canvas>

</div>

</div>

</div>

<script src="/static/js/dashboard.js"></script>

</body>

</html>
